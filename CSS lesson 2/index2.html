<head><title>Spotify Background Properties</title>

    <style>
        .star {
      width: 500px;
      height: 500px;
      background-color: yellow;
      border-radius: 70%;
      animation: twinkle 2s infinite alternate;
    }
 
    @keyframes twinkle {
      from { background-color: yellow; }
      to   { background-color: white; }
    }
        
        
        </style>


</head>
